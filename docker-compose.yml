name: mayorista

networks:
  mayorista_internal:
    internal: true
  edge_net:
    external: true
    name: tienda3d_edge_net

volumes:
  mayorista_db_data:
    external: true
    name: mayorista_mayorista_db_data

services:
  db_mayorista:
    image: postgres:15-alpine
    container_name: db_mayorista
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Matute00!
      POSTGRES_DB: mayorista
    volumes:
      - mayorista_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mayorista"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - mayorista_internal

  app_mayorista:
    build: .
    container_name: app_mayorista
    depends_on:
      db_mayorista:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV}
      BASE_URL: ${BASE_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      DB_HOST: db_mayorista
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: postgres
      DB_PASSWORD: Matute00!
      DB_NAME: mayorista
    volumes:
      - ./uploads:/app/uploads
      - ./public:/app/public
      - ./internal/views:/app/internal/views
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - mayorista_internal
      - edge_net
